name: Deploy To Netlify

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: python -m pip install -r requirements-netlify.txt

      - name: Build Netlify publish bundle
        run: python build_netlify_publish.py --rebuild-data

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy to Netlify production
        run: netlify deploy --prod --dir=netlify_publish --message "GitHub Actions deploy"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
